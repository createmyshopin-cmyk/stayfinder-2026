<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayFinder</title>

    <!-- Performance: early connection to Supabase (URL from env at build time) -->
    <link rel="preconnect" href="https://rqnxtcigfauzzjaqxzut.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://rqnxtcigfauzzjaqxzut.supabase.co" />

    <!-- Performance: early connection to Google Fonts CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load font via <link> not CSS @import — avoids render-blocking chain -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
